project:
  type: book
  output-dir: docs

book:
  title: "Theory and Methods in Causal Inference"
  author: "Jae-kwang Kim"
  date: today
  chapters:
    - index.qmd
    - chapter_01.qmd
  downloads: [pdf]

bibliography: references.bib

execute:
  engine: knitr

knitr:
  opts_chunk:
    dev: "pdf"
    fig.process: NULL

format:
  html:
    theme: cosmo
    html-math-method: mathjax
    toc: true
    toc-depth: 3
    number-sections: true
    include-in-header:
      text: |
        <script>
        window.MathJax = {
          tex: {
            tags: 'ams',
            macros: {
              doop:   ["\\operatorname{do}"],
              indep:  ["\\perp\\!\\!\\!\\perp"],
              nindep: ["\\not\\!\\perp\\!\\!\\!\\perp"],
              E:      ["\\mathbb{E}"],
              Gcal:   ["\\mathcal{G}"],
              Pa:     ["\\mathrm{Pa}"],
              De:     ["\\mathrm{De}"],
              An:     ["\\mathrm{An}"],
              Nd:     ["\\mathrm{Nd}"],
              pto:    ["\\overset{p}{\\to}"],
              expit:  ["\\operatorname{expit}"]
            }
          }
        };
        </script>
  pdf:
    documentclass: book
    number-sections: true
    colorlinks: true
    include-in-header:
      text: |
        \newcommand{\doop}{\operatorname{do}}
        \newcommand{\indep}{\perp\!\!\!\perp}
        \newcommand{\E}{\mathbb{E}}
        \newcommand{\Gcal}{\mathcal{G}}
        \newcommand{\Pa}{\mathrm{Pa}}
        \newcommand{\De}{\mathrm{De}}
        \newcommand{\An}{\mathrm{An}}
        \newcommand{\Nd}{\mathrm{Nd}}
        \newcommand{\pto}{\overset{p}{\to}}
        \newcommand{\expit}{\operatorname{expit}}
