project:
  type: book
  output-dir: docs

book:
  title: "Theory and Methods in Causal Inference"
  author: "Jae-kwang Kim"
  date: today
  chapters:
    - index.qmd
    - chapter_01.qmd
    - chapter_02.qmd
    - chapter_03.qmd
    - chapter_04.qmd
    - references.qmd
  downloads: [pdf]

bibliography: references.bib

execute:
  engine: knitr

knitr:
  opts_chunk:
    dev: "pdf"
    fig.process: NULL

format:
  html:
    theme: cosmo
    html-math-method: mathjax
    toc: true
    toc-depth: 3
    number-sections: true
    include-in-header:
      text: |
        <script>
        window.MathJax = {
          tex: {
            tags: 'ams',
            macros: {
              doop:   ["\\operatorname{do}"],
              indep:  ["\\perp\\!\\!\\!\\perp"],
              nindep: ["\\not\\!\\perp\\!\\!\\!\\perp"],
              E:      ["\\mathbb{E}"],
              Gcal:   ["\\mathcal{G}"],
              Pa:     ["\\mathrm{Pa}"],
              De:     ["\\mathrm{De}"],
              An:     ["\\mathrm{An}"],
              Nd:     ["\\mathrm{Nd}"],
              pto:    ["\\overset{p}{\\to}"],
              expit:  ["\\operatorname{expit}"]
            }
          }
        };
        </script>
        <style>
        .quarto-download-btn {
          background-color: #1e3864 !important;
          color: white !important;
          border: none !important;
          padding: 6px 14px !important;
          border-radius: 6px !important;
          font-weight: 600 !important;
          font-size: 0.85rem !important;
        }
        .quarto-download-btn:hover {
          background-color: #2e72b8 !important;
          color: white !important;
        }
        </style>
  pdf:
    documentclass: book
    number-sections: true
    colorlinks: true
    toc: false
    papersize: a4
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=2.5cm
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{centernot}
        \definecolor{isublue}{RGB}{30,56,100}
        \definecolor{accent}{RGB}{46,117,182}
        \definecolor{darkgrey}{RGB}{80,80,80}
        \renewcommand{\maketitle}{}
        \newcommand{\doop}{\operatorname{do}}
        \newcommand{\indep}{\perp\!\!\!\perp}
        \newcommand{\nindep}{\centernot{\indep}}
        \newcommand{\E}{\mathbb{E}}
        \newcommand{\Gcal}{\mathcal{G}}
        \newcommand{\Pa}{\mathrm{Pa}}
        \newcommand{\De}{\mathrm{De}}
        \newcommand{\An}{\mathrm{An}}
        \newcommand{\Nd}{\mathrm{Nd}}
        \newcommand{\pto}{\overset{p}{\to}}
        \newcommand{\expit}{\operatorname{expit}}
        \AtBeginDocument{%
          \begin{titlepage}
            \centering
            \vspace*{3cm}
            {\Huge\bfseries\color{isublue}
              Theory and Methods in Causal Inference}\\[1.2cm]
            {\LARGE\color{accent} Lecture Notes}\\[0.8cm]
            \color{accent}\rule{0.6\textwidth}{1.2pt}\\[0.8cm]
            {\large Jae Kwang Kim \\[0.3cm]
              Department of Statistics\\[0.3cm]
              Iowa State University}\\[2cm]
            {\normalsize STAT 5900B}\\[0.8cm]
            {\normalsize\color{darkgrey} Last updated: \today}\\[0.3cm]
            \vfill
          \end{titlepage}
          \tableofcontents
          \newpage
        }
